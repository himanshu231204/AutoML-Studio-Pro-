# Streamlit Community Cloud configuration for AutoML Studio Pro
# https://docs.streamlit.io/streamlit-community-cloud

[server]
headless = true
enableCORS = false
enableXsrfProtection = true
port = 8501
address = "0.0.0.0"

[browser]
serverAddress = ""
gatherUsageStats = false

[theme]
primaryColor = "#4F46E5"
backgroundColor = "#0F172A"
secondaryBackgroundColor = "#1E293B"
textColor = "#F8FAFC"
font = "sans serif"

[runner]
magicEnabled = true
fastReruns = true

[client]
showErrorDetails = true
toolbarMode = "minimal"
