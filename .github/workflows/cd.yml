name: CD

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  package-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Validate before release
        shell: bash
        run: |
          python -m compileall .
          if ls tests/test_*.py tests/*_test.py >/dev/null 2>&1; then
            pytest -q
          else
            echo "No tests found in tests/. Proceeding with release package."
          fi

      - name: Build release package
        shell: bash
        run: |
          mkdir -p dist
          zip -r dist/automl-studio-pro-${{ github.ref_name }}.zip . \
            -x "*.git*" "*__pycache__*" "*.pytest_cache*" "*.venv*" "*.mypy_cache*"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-package-${{ github.ref_name }}
          path: dist/*.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
