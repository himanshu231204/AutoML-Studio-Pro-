# Dependabot configuration for AutoML Studio Pro
# ================================================
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 10
    reviewers:
      - "himanshu231204"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
      include: "scope"
    ignore:
      # Ignore patch updates for stability
      - dependency-name: "scikit-learn"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "streamlit"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "pandas"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "numpy"
        update-types: ["version-update:semver-patch"]
    groups:
      # Group minor and patch updates together
      python-packages:
        patterns:
          - "*"
        exclude-patterns:
          - "scikit-learn"
          - "streamlit"
          - "pandas"
          - "numpy"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5
    reviewers:
      - "himanshu231204"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"

  # Docker dependencies
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "1"
      time: "09:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 3
    reviewers:
      - "himanshu231204"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "docker"
      include: "scope"
