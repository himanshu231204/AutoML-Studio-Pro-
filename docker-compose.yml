services:
  automl-studio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: automl_studio_pro
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    restart: unless-stopped
